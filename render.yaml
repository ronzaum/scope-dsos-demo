services:
  - type: web
    name: ds-os
    runtime: node
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../api && npm install
    startCommand: cd api && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DSOS_JWT_SECRET
        generateValue: true
      - key: LINEAR_TEAM_ID
        sync: false
      - key: LINEAR_PROJECT_ID
        sync: false
      - key: LINEAR_ASSIGNEE_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
